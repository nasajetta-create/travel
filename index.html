<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>旅遊分帳</title>
<meta name="theme-color" content="#0f766e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="旅遊分帳">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{
--bg:#FAF6F0;--card:#ffffff;--cardBd:rgba(0,0,0,0);--tx:#292524;--tx2:#78716C;--tx3:#B8B0A4;--line:#F0EAE0;
--acc:#0F766E;--accBg:#CCFBF1;--accTx:#0F5132;--accOn:#ffffff;
--in:#ffffff;--inBd:#E5DDD2;--ro:#F6F1E9;
--dash:#0F766E;--dashTx:#ffffff;--dashTx2:#99D5CD;--dashAcc:#5EEAD4;--dashBar:rgba(255,255,255,.25);
--hdr:#0F766E;--hdrTx:#ffffff;
--danger:#b91c1c;--dangerBd:#fca5a5;--warnBg:#fef3c7;--warnTx:#92400e;--warnBd:#d97706;
--shadow:0 1px 3px rgba(120,100,80,.1);
--ctFood:#FDE8E0;--ctTrans:#E0EDFB;--ctStay:#EDE7F9;--ctShop:#FBE3EE;--ctTix:#FAEEDA;--ctDaily:#DDF3F7;--ctMisc:#EFECE5;
}
:root[data-theme="dark"]{
--bg:#101614;--card:#1B2420;--cardBd:#22302B;--tx:#E8F0ED;--tx2:#8FA69E;--tx3:#5C7A70;--line:#22302B;
--acc:#2DD4A7;--accBg:#173B32;--accTx:#7DE8C9;--accOn:#0B1F19;
--in:#141C19;--inBd:#2A3833;--ro:#141C19;
--dash:#1B2420;--dashTx:#E8F0ED;--dashTx2:#5C7A70;--dashAcc:#2DD4A7;--dashBar:#22302B;
--hdr:#16201C;--hdrTx:#E8F0ED;
--danger:#F09595;--dangerBd:#793030;--warnBg:#3A2E14;--warnTx:#F5D06F;--warnBd:#8a6d1d;
--shadow:none;
--ctFood:#243530;--ctTrans:#243530;--ctStay:#243530;--ctShop:#243530;--ctTix:#243530;--ctDaily:#243530;--ctMisc:#243530;
}
@media (prefers-color-scheme: dark){
:root:not([data-theme="light"]){
--bg:#101614;--card:#1B2420;--cardBd:#22302B;--tx:#E8F0ED;--tx2:#8FA69E;--tx3:#5C7A70;--line:#22302B;
--acc:#2DD4A7;--accBg:#173B32;--accTx:#7DE8C9;--accOn:#0B1F19;
--in:#141C19;--inBd:#2A3833;--ro:#141C19;
--dash:#1B2420;--dashTx:#E8F0ED;--dashTx2:#5C7A70;--dashAcc:#2DD4A7;--dashBar:#22302B;
--hdr:#16201C;--hdrTx:#E8F0ED;
--danger:#F09595;--dangerBd:#793030;--warnBg:#3A2E14;--warnTx:#F5D06F;--warnBd:#8a6d1d;
--shadow:none;
--ctFood:#243530;--ctTrans:#243530;--ctStay:#243530;--ctShop:#243530;--ctTix:#243530;--ctDaily:#243530;--ctMisc:#243530;
}}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--tx);margin:0;font-size:15px}
#wrap{max-width:520px;margin:0 auto;min-height:100vh}
header{position:sticky;top:0;z-index:10;background:var(--hdr);color:var(--hdrTx);padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
header .hname{font-size:17px;font-weight:600}
header .hsync{font-size:12px;background:rgba(255,255,255,.16);padding:2px 8px;border-radius:10px}
header .hq{font-size:13px;background:rgba(255,255,255,.16);width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;margin-left:6px}
section{display:none;padding:12px 12px 90px}
section.act{display:block}
.card{background:var(--card);border:1px solid var(--cardBd);border-radius:16px;padding:12px;margin-bottom:10px;box-shadow:var(--shadow)}
.dash{background:var(--dash);border:1px solid var(--cardBd);border-radius:16px;padding:12px 14px;margin-bottom:10px}
.dash .drow{display:flex;gap:16px;flex-wrap:wrap}
.dash .dl{font-size:10.5px;color:var(--dashTx2);margin:0}
.dash .dv{font-size:17px;font-weight:700;color:var(--dashTx);margin:0}
.dash .dv.acc{color:var(--dashAcc)}
.dash .dv.warn{color:#FCD34D}
.dash .dtag{font-size:10px;background:var(--dashBar);color:var(--dashTx);padding:2px 8px;border-radius:9px}
.dbar{height:5px;background:var(--dashBar);border-radius:3px;margin-top:7px;overflow:hidden}
.dbar>div{height:100%;background:var(--dashAcc);border-radius:3px}
.dbar.over>div{background:#F87171}
.dnote{font-size:9.5px;color:var(--dashTx2);margin:3px 0 0}
.lbl{font-size:12px;color:var(--tx2);margin:2px 0 4px}
input[type=text],input[type=number],input[type=date],select{width:100%;padding:9px 10px;border:1px solid var(--inBd);border-radius:10px;font-size:15px;background:var(--in);color:var(--tx)}
input:focus,select:focus{outline:2px solid rgba(15,118,110,.25);border-color:var(--acc)}
input[type=color]{padding:0;width:30px;height:24px;border:1px solid var(--inBd);border-radius:6px;background:var(--in)}
.ro{padding:9px 10px;border:1px dashed var(--inBd);border-radius:10px;background:var(--ro);font-size:15px;min-height:39px}
.row{display:flex;gap:8px;align-items:center}
.row>*{flex:1}
.row .fix{flex:0 0 auto}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:7px 13px;border-radius:18px;border:1px solid var(--inBd);background:var(--card);font-size:14px;cursor:pointer;user-select:none;color:var(--tx)}
.chip.on{background:var(--accBg);border-color:var(--acc);color:var(--accTx);font-weight:600}
.chip.pay{background:var(--acc);border-color:var(--acc);color:var(--accOn);font-weight:600}
.bdg{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;font-weight:600;position:relative;user-select:none;flex:0 0 auto}
.b18{width:18px;height:18px;font-size:9.5px}
.b34{width:36px;height:36px;font-size:15px;cursor:pointer}
.bdg .gift{position:absolute;top:-6px;right:-6px;font-size:11px}
.fnote{font-size:11px;color:var(--warnTx);margin:3px 0 0}
.seg{display:flex;border:1px solid var(--inBd);border-radius:10px;overflow:hidden;font-size:12.5px;text-align:center}
.seg span{flex:1;padding:6px 4px;background:var(--card);color:var(--tx2);cursor:pointer}
.seg span.on{background:var(--acc);color:var(--accOn);font-weight:600}
.btn{display:block;width:100%;padding:12px;border:none;border-radius:12px;background:var(--acc);color:var(--accOn);font-size:16px;font-weight:600;cursor:pointer}
.btn.sub{background:var(--card);color:var(--tx);border:1px solid var(--inBd);font-weight:400}
.btn.danger{background:var(--card);color:var(--danger);border:1px solid var(--dangerBd);font-weight:400}
.btn.mini{display:inline-block;width:auto;padding:6px 12px;font-size:13px}
.exp{display:flex;align-items:center;gap:8px;padding:8px 2px;border-bottom:1px solid var(--line);cursor:pointer}
.exp:last-child{border-bottom:none}
.exp .ico{width:34px;height:34px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;font-size:16px;flex:0 0 auto}
.ct-food{background:var(--ctFood)}.ct-trans{background:var(--ctTrans)}.ct-stay{background:var(--ctStay)}.ct-shop{background:var(--ctShop)}.ct-tix{background:var(--ctTix)}.ct-daily{background:var(--ctDaily)}.ct-misc{background:var(--ctMisc)}
.exp .mid{flex:1;min-width:0}
.exp .t1{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp .t2{font-size:11px;color:var(--tx3);margin-top:2px;display:flex;align-items:center;gap:3px;flex-wrap:wrap}
.exp .amt{text-align:right;flex:0 0 auto}
.exp .a1{font-size:14px;font-weight:700;color:var(--acc)}
.exp .a2{font-size:10.5px;color:var(--tx3)}
.exp .rx{flex:0 0 auto;border:none;background:none;color:var(--tx3);font-size:14px;padding:2px 4px;cursor:pointer}
.dhead{display:flex;justify-content:space-between;font-size:12px;color:var(--tx3);margin:12px 4px 5px;font-weight:600}
.sumrow{display:flex;justify-content:space-between;padding:3px 0;font-size:14px}
table.st{width:100%;border-collapse:collapse;font-size:13px}
table.st th{font-weight:400;color:var(--tx2);font-size:11.5px;text-align:right;padding:4px 2px;border-bottom:1px solid var(--line)}
table.st th:first-child,table.st td:first-child{text-align:left}
table.st td{text-align:right;padding:5px 2px;border-bottom:1px solid var(--line)}
.pos{color:#059669;font-weight:600}
.neg{color:#dc2626;font-weight:600}
:root[data-theme="dark"] .pos{color:#34D399}
:root[data-theme="dark"] .neg{color:#F87171}
@media (prefers-color-scheme: dark){:root:not([data-theme="light"]) .pos{color:#34D399}:root:not([data-theme="light"]) .neg{color:#F87171}}
.tf{display:flex;justify-content:space-between;align-items:center;background:var(--ro);border:1px solid var(--inBd);border-radius:12px;padding:8px 10px;margin-top:6px;gap:8px}
.tf .who{font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:4px}
.tf .bank{font-size:11px;color:var(--tx2);margin-top:2px}
.tf .amt{font-size:14.5px;font-weight:700;color:var(--acc)}
.tf.done .who,.tf.done .amt{text-decoration:line-through;opacity:.5}
.tf input[type=checkbox]{width:19px;height:19px;flex:0 0 auto}
details.day{background:var(--card);border:1px solid var(--cardBd);border-radius:14px;margin-bottom:8px;box-shadow:var(--shadow)}
details.day>summary{list-style:none;cursor:pointer;padding:11px 12px;display:flex;justify-content:space-between;align-items:center;font-size:13.5px;font-weight:600}
details.day>summary::-webkit-details-marker{display:none}
details.day>summary .arr{color:var(--tx3);margin-right:6px;font-size:11px}
details.day[open]>summary .arr{transform:rotate(90deg);display:inline-block}
details.day .dbody{padding:0 12px 11px}
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:var(--card);border-top:1px solid var(--line);display:flex;z-index:20;padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;border:none;background:none;padding:8px 0 7px;font-size:11px;color:var(--tx3);cursor:pointer}
nav button .nico{display:block;font-size:19px;margin-bottom:1px}
nav button.on{color:var(--acc);font-weight:700}
.mgrp{border-bottom:1px dashed var(--line);padding:7px 0}
.mrow{display:flex;gap:6px;align-items:center}
.mrow input{padding:7px 8px;font-size:14px}
.mrow .mn{flex:0 0 72px}
.mrow .mb{flex:0 0 86px}
.mrow .ma{flex:1}
.mrow .mx{flex:0 0 auto;border:none;background:none;color:var(--tx3);font-size:17px;cursor:pointer;padding:4px}
.mrow2{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--tx2);margin-top:5px;flex-wrap:wrap}
.mrow2 input[type=number]{width:56px;padding:4px 6px;font-size:13px}
.mrow2 input[type=text]{width:44px;padding:4px 6px;font-size:13px;text-align:center}
.mrow2 select{width:auto;padding:4px 6px;font-size:13px}
.hint{font-size:12px;color:var(--tx2);line-height:1.55}
.codebox{display:flex;align-items:center;gap:8px;background:var(--accBg);border:1px dashed var(--acc);border-radius:12px;padding:9px 12px}
.codebox b{font-size:20px;letter-spacing:3px;color:var(--accTx);font-family:ui-monospace,monospace}
.tag{display:inline-block;font-size:11px;padding:1px 7px;border-radius:9px;background:var(--accBg);color:var(--accTx)}
.tag.warn{background:var(--warnBg);color:var(--warnTx)}
.hbar{height:14px;background:var(--ro);border-radius:7px;overflow:hidden;flex:1}
.hbar>div{height:100%;border-radius:7px}
.srow{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:13px}
.srow .sl{flex:0 0 84px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.srow .sv{flex:0 0 auto;color:var(--tx2);font-size:12px;min-width:76px;text-align:right}
.cols{display:flex;align-items:flex-end;gap:3px;height:110px;margin-top:8px}
.cols .col{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:100%}
.cols .cbar{width:100%;background:var(--acc);border-radius:3px 3px 0 0;min-height:2px}
.cols .clab{font-size:9.5px;color:var(--tx3);margin-top:3px;white-space:nowrap}
#toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:8px 16px;border-radius:20px;font-size:13.5px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:50;max-width:88%}
.empty{text-align:center;color:var(--tx3);padding:36px 0;font-size:14px;line-height:1.8}
.ver{text-align:center;font-size:11px;color:var(--tx3);padding:6px 0 12px}
.frow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px dashed var(--line);font-size:13.5px}
.frow:last-child{border-bottom:none}
.frow .fx{border:none;background:none;color:var(--tx3);font-size:15px;cursor:pointer;padding:2px 5px}
.dv .cur,.amt .cur,.a1 .cur{font-size:62%;font-weight:400;opacity:.75}
.divv{width:1px;background:var(--dashBar);margin:2px 0;flex:0 0 auto}
.dash .dcol{flex:1;text-align:center;min-width:0}
.tf .amt{white-space:nowrap;flex:0 0 auto}
.banner{background:var(--warnBg);border:1px solid var(--warnBd);border-radius:12px;padding:8px 11px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.banner .bt{font-size:12.5px;color:var(--warnTx)}
.banner .bx{border:none;background:none;color:var(--warnTx);font-size:15px;cursor:pointer;padding:2px 4px}
.heatg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px}
.heatg .hc{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer}
.heatg .hl{font-size:9.5px;color:var(--tx3);text-align:center}
.donutw{display:flex;align-items:center;gap:14px;margin-top:8px}
.donut{width:130px;height:130px;border-radius:50%;position:relative;flex:0 0 auto}
.donut .dc{position:absolute;inset:26px;border-radius:50%;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center}
.cseg{display:flex;gap:2px;border:1px solid var(--inBd);border-radius:8px;overflow:hidden}
.cseg span{padding:3px 8px;font-size:12px;cursor:pointer;background:var(--card);color:var(--tx3)}
.cseg span.on{background:var(--acc);color:var(--accOn)}
.qa{border-bottom:1px solid var(--line);padding:9px 2px}
.qa:last-child{border-bottom:none}
.qa .q{font-size:14px;font-weight:600;margin:0}
.qa .a{font-size:13px;color:var(--tx2);margin:4px 0 0;line-height:1.6}
</style>
</head>
<body>
<div id="wrap">
<header>
  <div style="min-width:0">
    <div class="hname" id="hName" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">旅遊分帳</div>
    <div id="hDates" style="font-size:10.5px;opacity:.85"></div>
  </div>
  <div style="display:flex;align-items:center;flex:0 0 auto">
    <div class="hsync" id="hSync">本機</div>
    <div class="hq" id="hHelp" title="使用說明">❓</div>
  </div>
</header>

<section id="v-ledger" class="act">
  <div class="dash" id="ledgerSum"></div>
  <div id="ledgerList"></div>
</section>

<section id="v-add">
  <div class="card" id="tplCard" style="display:none">
    <div id="recBlock" style="display:none">
      <span class="lbl" style="margin:0">最近記過（點一下帶入，日期改今天）</span>
      <div class="chips" id="recChips" style="margin-top:6px;margin-bottom:8px"></div>
    </div>
    <div id="tplBlock" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center"><span class="lbl" style="margin:0">快速模板</span><span class="chip" id="tplEditBtn" style="padding:3px 10px;font-size:12px">編輯</span></div>
      <div class="chips" id="tplChips" style="margin-top:6px"></div>
    </div>
  </div>
  <div class="card">
    <div class="row">
      <div><div class="lbl">日期</div><input type="date" id="eDate"></div>
      <div><div class="lbl">項目</div><input type="text" id="eDesc" placeholder="輸入項目名稱"></div>
    </div>
    <div class="lbl" style="margin-top:8px">類別</div>
    <div class="chips" id="catChips"></div>
  </div>
  <div class="card">
    <div class="row">
      <div><div class="lbl">消費幣別</div><select id="eCur"></select></div>
      <div style="flex:1.5"><div class="lbl">消費金額</div><input type="number" id="eAmt" inputmode="decimal" placeholder="0"><div class="fnote" id="feeNote" style="display:none"></div></div>
    </div>
    <div class="row" style="margin-top:8px;align-items:flex-start">
      <div><div class="lbl">匯率（1 消費幣 = ? 主幣）</div>
        <div class="row" style="gap:6px"><input type="number" id="eRate" inputmode="decimal" step="any"><button class="btn sub mini fix" id="btnRate">抓當日</button></div>
      </div>
      <div><div class="lbl">信用卡手續費</div>
        <div class="row" style="gap:6px"><label class="fix" style="display:flex;align-items:center;gap:4px;font-size:13.5px"><input type="checkbox" id="eCard" style="width:17px;height:17px">刷卡</label><input type="number" id="eFee" inputmode="decimal" step="any" placeholder="%"></div>
      </div>
    </div>
    <div class="hint" id="rateInfo"></div>
    <label style="display:flex;align-items:center;gap:6px;font-size:13px;margin-top:6px;color:var(--tx2)"><input type="checkbox" id="eLock" style="width:16px;height:16px">🔒 鎖定幣別與匯率（連續記帳不重抓、不重選）</label>
    <div class="row" style="margin-top:8px">
      <div><div class="lbl">轉換幣別（參考顯示）</div><select id="eConvCur"></select></div>
      <div style="flex:1.5"><div class="lbl">轉換後的消費金額</div><div class="ro" style="font-weight:700;color:var(--acc)" id="convOut">—</div></div>
    </div>
    <div class="hint" id="convHint" style="margin-top:4px"></div>
  </div>
  <div class="card">
    <label style="display:flex;align-items:center;gap:8px;font-size:14.5px;margin-bottom:10px"><input type="checkbox" id="ePriv" style="width:18px;height:18px">🔒 私人帳（只存自己手機、不同步、不進團體結算）</label>
    <div id="splitWrap">
    <div class="lbl">誰先付</div>
    <div class="chips" id="payerChips"></div>
    <div class="lbl" style="margin-top:10px">分攤（點一下＝分攤 → 再點＝被請客🎁 → 再點＝不參與）</div>
    <div class="chips" id="splitChips"></div>
    <div id="treatByBox"></div>
    <div class="hint" style="margin-top:6px">「被請客」＝這個人的份由「請客人」吸收，請客人預設是付款人、可以改。分攤照人頭數權重計算。</div>
    <div class="row" style="margin-top:10px">
      <div><div class="lbl">分法</div><select id="eMode"><option value="avg">均分（按人頭數）</option><option value="custom">自訂各人金額（消費幣別）</option></select></div>
    </div>
    <div id="customBox" style="margin-top:8px"></div>
    </div>
  </div>
  <button class="btn" id="btnSave">儲存</button>
  <button class="btn sub" id="btnCopy" style="display:none;margin-top:8px">⧉ 複製成新帳（日期改今天）</button>
  <button class="btn sub" id="btnTpl" style="margin-top:8px">☆ 把這筆的項目/類別/幣別存成模板</button>
  <button class="btn danger" id="btnDel" style="display:none;margin-top:8px">刪除這筆</button>
</section>

<section id="v-settle">
  <div id="settleBox"></div>
</section>

<section id="v-stats">
  <div id="statsBox"></div>
</section>

<section id="v-help">
  <div class="card">
    <div class="lbl" style="font-weight:600;color:var(--tx)">❓ 使用說明</div>
    <input type="text" id="helpQ" placeholder="輸入問題關鍵字，例：請客、匯率、基金、小孩…">
  </div>
  <div class="card" id="helpList"></div>
</section>

<section id="v-trip">
  <div id="tripBox"></div>
  <div id="tripsListBox"></div>
  <div id="cloudBox"></div>

function dl(name, content, mime){

}
function sim(a, b){
  a = String(a||'').trim(); b = String(b||'').trim();
  if(!a || !b) return 0;
  if(a === b) return 1;
  var short_ = a.length <= b.length ? a : b, long_ = a.length <= b.length ? b : a;
  var pool = long_.split(''), hit = 0;
  short_.split('').forEach(function(ch){ var i = pool.indexOf(ch); if(i >= 0){ hit++; pool.splice(i,1); } });
  return 2 * hit / (a.length + b.length);
}

/* ───── 金額計算 ───── */
function factor(e){ return (Number(e.rate)||0) * (e.card ? (1 + (Number(e.feePct)||0)/100) : 1); }
function homeAmt(e){ return (Number(e.amt)||0) * factor(e); }
function treaterFor(e, id, ids){
  var tb = (e.treatBy && e.treatBy[id]) || e.payer;
  var treated = e.treat || [];
  var ok = tb !== FUND && tb !== id && ids.indexOf(tb) >= 0 && treated.indexOf(tb) < 0;
  if(ok) return tb;
  for(var i=0;i<ids.length;i++){ if(ids[i] !== id && treated.indexOf(ids[i]) < 0) return ids[i]; }
  return null;
}
function shares(e){
  var out = {}; var ids = e.split || []; if(!ids.length) return out;
  var t = trip(); var f = factor(e);
  if(e.mode === 'custom'){ ids.forEach(function(id){ out[id] = (Number(e.custom && e.custom[id]) || 0) * f; }); }
  else {
    var sw = 0; ids.forEach(function(id){ sw += weightOf(t, id); });
    var total = homeAmt(e);
    if(sw <= 0){ ids.forEach(function(id){ out[id] = total / ids.length; }); }
    else { ids.forEach(function(id){ out[id] = total * weightOf(t, id) / sw; }); }
  }
  (e.treat || []).forEach(function(id){
    if(out[id] == null) return;
    var tb = treaterFor(e, id, ids);
    if(tb){ out[tb] = (out[tb] || 0) + out[id]; out[id] = 0; }
  });
  return out;
}
function fundTotals(t){
  var fin = 0, fout = 0;
  (t.fund || []).forEach(function(c){ if(!c._del) fin += Number(c.amt) || 0; });
  t.expenses.forEach(function(e){ if(!e._del && e.payer === FUND) fout += homeAmt(e); });
  return { fin: fin, fout: fout, bal: fin - fout };
}

function updateConv(){
  var t = trip(); if(!t) return;

  if(F.card && amt > 0){
    var tot = amt * (1 + (Number(F.feePct)||0)/100);
    fn.style.display = '';

  } else { fn.style.display = 'none'; }
  var homeV = homeAmt({ amt:F.amt, rate:F.rate, card:F.card, feePct:F.feePct });
  var out = document.getElementById('convOut');
  var hintEl = document.getElementById('convHint');
  var cc = _convCur || t.home;
  if(homeV <= 0){ out.textContent = '—'; hintEl.textContent = ''; return; }
  if(cc === t.home){
    out.textContent = t.home + ' ' + fmt2(homeV) + (F.card ? '（含手續費）' : '');
    hintEl.textContent = '';
    return;
  }
  var dk = F.date || todayISO();
  var key = t.home + '_' + cc + '_' + dk;
  if(S.rateCache[key]){
    out.textContent = '≈ ' + cc + ' ' + fmt2(homeV * S.rateCache[key]);
    hintEl.textContent = '參考顯示；記帳與結算仍以 ' + t.home + ' ' + fmt2(homeV) + ' 為準';
    return;
  }
  out.textContent = '換算中…';
  fetchRateFor(t.home, cc, dk, function(r){
    S.rateCache[key] = r; saveLocal(); updateConv();
  }, function(){ out.textContent = '抓不到 ' + cc + ' 匯率'; });
}
function fetchRateFor(cur, home, date, ok, fail){
  var today = todayISO();
  var d = (date && date < today) ? date : 'latest';
  var u = 'https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@' + d + '/v1/currencies/' + cur.toLowerCase() + '.json';
  fetch(u).then(function(r){ return r.json(); }).then(function(j){
    var v = j && j[cur.toLowerCase()] && j[cur.toLowerCase()][home.toLowerCase()];
    if(v) ok(Math.round(v * 1000000) / 1000000); else fail();
  }).catch(function(){
    if(d === 'latest'){
      fetch('https://open.er-api.com/v6/latest/' + cur).then(function(r){ return r.json(); }).then(function(j){
        var v = j && j.rates && j.rates[home];
        if(v) ok(Math.round(v * 1000000) / 1000000); else fail();
      }).catch(fail);
    } else fail();
  });
}
function autoRate(showErr){

  if(lk.on && F.rate){ info.textContent = '🔒 匯率已鎖定 ' + F.rate + '（取消鎖定才會重抓）'; updateConv(); return; }

  if(S.rateCache[key]){ F.rate = S.rateCache[key]; document.getElementById('eRate').value = F.rate; info.textContent = lab + ' 1 ' + F.cur + ' ≈ ' + F.rate + ' ' + t.home + '（快取，可手動改）'; updateConv(); return; }

  fetchRateFor(F.cur, t.home, dk, function(r){

    info.textContent = lab + ' 1 ' + F.cur + ' ≈ ' + r + ' ' + t.home + '（可手動改成刷卡匯率）';

  }, function(){

function dupCheck(e){
  var t = trip(); if(!t) return true;
  var all = t.expenses.filter(function(x){ return !x._del; }).concat(privList().filter(function(x){ return !x._del; }));
  for(var i=0;i<all.length;i++){
    var x = all[i];
    if(x.id === e.id || x.date !== e.date) continue;
    var sameAmt = Number(x.amt) === Number(e.amt) && x.cur === e.cur && x.cat === e.cat;
    var similar = sim(x.desc, e.desc) >= 0.9;
    if(sameAmt || similar){
      return confirm('⚠️ 疑似重複！\n' + x.date + ' 已有「' + x.desc + ' ' + x.cur + ' ' + fmt2(x.amt) + '」\n仍要儲存這筆嗎？');
    }
  }
  return true;
}
function saveExpense(){
  var t = trip(); if(!t) return;
  var amt = Number(F.amt), rate = Number(F.rate);
  if(!(amt > 0)){ toast('請輸入消費金額'); return; }
  if(!(rate > 0)){ toast('請輸入匯率（可按「抓當日」）'); return; }
  var treated = F.treat.filter(function(id){ return F.split.indexOf(id) >= 0; });
  if(F.priv){
    if(!me()){ toast('先到「旅程」設定「我是誰」'); return; }
  } else {
    if(!F.payer){ toast('請選付款人'); return; }
    if(!F.split.length){ toast('請選分攤的人'); return; }
    if(treated.length >= F.split.length){ toast('不能全部人都被請客'); return; }
    var payerOut = (F.payer === FUND) || (F.split.indexOf(F.payer) < 0);
    for(var k=0;k<treated.length;k++){
      var tb0 = F.treatBy ? F.treatBy[treated[k]] : null;
      var valid = tb0 && tb0 !== treated[k] && F.split.indexOf(tb0) >= 0 && treated.indexOf(tb0) < 0;
      if(!valid && payerOut){
        toast('付款人不在分攤名單，請為「' + mname(treated[k]) + '」指定請客人'); return;
      }
    }
    if(F.mode === 'custom'){
      var sum = 0; F.split.forEach(function(id){ sum += Number(F.custom[id]) || 0; });
      if(Math.abs(sum - amt) >= 0.5){ toast('自訂金額合計要等於總額'); return; }
    }
  }
  var ci = catInfo(F.cat);
  var tb = {};
  treated.forEach(function(id){ var v = (F.treatBy && F.treatBy[id]) || null; if(v && v !== id && F.split.indexOf(v) >= 0 && treated.indexOf(v) < 0) tb[id] = v; });
  var e = { id: editId || uid(), date: F.date || todayISO(), cat: F.cat, desc: F.desc || ci[2],
    cur: F.cur, amt: amt, rate: rate, card: !!F.card, feePct: Number(F.feePct) || 0,
    payer: F.payer, split: F.split.slice(), treat: treated.slice(), treatBy: tb,
    mode: F.mode, custom: {}, _mt: Date.now() };
  if(F.mode === 'custom' && !F.priv){ F.split.forEach(function(id){ e.custom[id] = Number(F.custom[id]) || 0; }); }
  if(F.priv){ e.priv = true; e.payer = me(); e.split = [me()]; e.treat = []; e.treatBy = {}; e.mode = 'avg'; e.custom = {}; }
  if(!editId && !dupCheck(e)) return;
  if(!e.priv){
    var affected = [e.date];
    if(editId){ var old = findExpense(editId); if(old && !old.priv && old.date !== e.date) affected.push(old.date); }
    if(!resetDaysIfSettled(t, affected)) return;
  }
  var pl = privList();
  var gi = -1, pi = -1, i;
  for(i=0;i<t.expenses.length;i++){ if(t.expenses[i].id === e.id){ gi = i; break; } }
  for(i=0;i<pl.length;i++){ if(pl[i].id === e.id){ pi = i; break; } }
  if(e.priv){
    if(gi >= 0){ t.expenses[gi]._del = true; t.expenses[gi]._mt = Date.now(); }
    if(pi >= 0) pl[pi] = e; else pl.push(e);
  } else {
    if(pi >= 0) pl.splice(pi, 1);
    if(gi >= 0) t.expenses[gi] = e; else t.expenses.push(e);
  }
  var lk = lockObj();
  if(lk.on){ lk.cur = e.cur; lk.rate = e.rate; }
  F = null; editId = null;
  save(); go('ledger'); toast('已儲存');
}
function dayKeysOf(t, date){

}
function resetDaysIfSettled(t, dates){
  var hit = [];
  dates.forEach(function(d){ if(d && dayKeysOf(t, d).length && hit.indexOf(d) < 0) hit.push(d); });
  if(!hit.length) return true;
  if(!confirm('⚠️ ' + hit.join('、') + ' 已有轉帳完成勾選。\n改動帳目後金額會變，該日的結清勾選將全部重置，大家要重新對帳。\n\n確定繼續？')) return false;
  hit.forEach(function(d){ dayKeysOf(t, d).forEach(function(k){ delete t.tfDone[k]; }); });

}

  var ges = t.expenses.filter(function(e){ return !e._del; });
  var pes = privList().filter(function(e){ return !e._del; });
  var total = 0, ptotal = 0, today = 0, tday = todayISO(), minD = null;
  ges.forEach(function(e){ var h = homeAmt(e); total += h; if(e.date === tday) today += h; if(!minD || e.date < minD) minD = e.date; });
  pes.forEach(function(e){ var h = homeAmt(e); ptotal += h; if(e.date === tday) today += h; if(!minD || e.date < minD) minD = e.date; });
  var ft = fundTotals(t);

  }

      MU = unitId(t, meM);

      Ms.days.forEach(function(dy){
        dy.calc.transfers.forEach(function(f, i){

          if(!t.tfDone[dy.keys[i]]) myUnpaid += f.amt;
        });
      });
    }
  }
  var lcols = [
    '<div class="dcol"><p class="dl">今日（含私人）</p><p class="dv acc">' + money(t.home, today) + '</p></div>',
    '<div class="dcol"><p class="dl">團體總支出</p><p class="dv">' + money(t.home, total) + '</p></div>'
  ];

/* ───── 結算（按日）───── */
function unitId(t, m){ return (m.famId && famName(t, m.famId)) ? 'f' + m.famId : 'm' + m.id; }
function unitsMeta(t){
  var units = {};
  t.members.forEach(function(m){
    var u = unitId(t, m);
    if(!units[u]) units[u] = { id: u, name: (m.famId && famName(t, m.famId)) || m.name, bank: '', mids: [], solo: !(m.famId && famName(t, m.famId)) ? m.id : null };
    units[u].mids.push(m.id);
    if(!units[u].bank && (m.bank || m.acct)) units[u].bank = ((m.bank || '') + ' ' + (m.acct || '')).trim();
  });
  return units;
}
function calcOver(t, es){
  var paid = {}, share = {};
  t.members.forEach(function(m){ paid[m.id] = 0; share[m.id] = 0; });
  es.forEach(function(e){
    if(e.payer === FUND) return;
    var h = homeAmt(e);
    if(paid[e.payer] != null) paid[e.payer] += h;
    var sh = shares(e);
    Object.keys(sh).forEach(function(id){ if(share[id] != null) share[id] += sh[id]; });
  });
  var units = unitsMeta(t);
  var ub = {};
  t.members.forEach(function(m){
    var u = unitId(t, m);
    ub[u] = (ub[u] || 0) + (paid[m.id] || 0) - (share[m.id] || 0);
  });
  return { paid: paid, share: share, transfers: greedyTf(ub), units: units, ub: ub };
}
function greedyTf(ub){
  var cred = [], debt = [];
  Object.keys(ub).forEach(function(k){
    if(ub[k] > 0.5) cred.push({ id: k, b: ub[k] });
    else if(ub[k] < -0.5) debt.push({ id: k, b: -ub[k] });
  });
  cred.sort(function(a,b){ return b.b - a.b; });
  debt.sort(function(a,b){ return b.b - a.b; });
  var tf = [], i = 0, j = 0;
  while(i < cred.length && j < debt.length){
    var x = Math.min(cred[i].b, debt[j].b);
    tf.push({ from: debt[j].id, to: cred[i].id, amt: x });
    cred[i].b -= x; debt[j].b -= x;
    if(cred[i].b < 0.5) i++;
    if(debt[j].b < 0.5) j++;
  }
  return tf;
}
function settleModel(t){
  var ges = t.expenses.filter(function(e){ return !e._del; });
  var totalSpend = 0;
  var byDate = {};
  ges.forEach(function(e){ totalSpend += homeAmt(e); (byDate[e.date] = byDate[e.date] || []).push(e); });
  var dates = Object.keys(byDate).sort().reverse();
  var days = dates.map(function(d){
    var es = byDate[d];
    var dayTotal = 0; es.forEach(function(e){ dayTotal += homeAmt(e); });
    var r = calcOver(t, es);
    var keys = r.transfers.map(function(f){ return d + '|' + f.from + '>' + f.to; });
    var done = r.transfers.length === 0 || keys.every(function(k){ return !!t.tfDone[k]; });
    return { date: d, es: es, total: dayTotal, calc: r, keys: keys, done: done };
  });
  var settled = 0;
  days.forEach(function(dy){ if(dy.done) settled += dy.total; });
  var unEs = [];
  days.forEach(function(dy){ if(!dy.done) unEs = unEs.concat(dy.es); });
  var finalCalc = calcOver(t, unEs);
  var ub2 = {};
  Object.keys(finalCalc.ub).forEach(function(k){ ub2[k] = finalCalc.ub[k]; });
  days.forEach(function(dy){
    if(dy.done) return;
    dy.calc.transfers.forEach(function(f, i){
      if(t.tfDone[dy.keys[i]]){
        ub2[f.from] = (ub2[f.from] || 0) + f.amt;
        ub2[f.to] = (ub2[f.to] || 0) - f.amt;
      }
    });
  });
  finalCalc.transfers = greedyTf(ub2);
  var ft = fundTotals(t);
  var contribBy = {};
  (t.fund || []).forEach(function(c){ if(!c._del){ contribBy[c.mid] = (contribBy[c.mid] || 0) + (Number(c.amt) || 0); } });
  var refunds = [];
  if(ft.bal > 0.5 && ft.fin > 0){
    Object.keys(contribBy).forEach(function(mid){
      var r = ft.bal * contribBy[mid] / ft.fin;
      if(r > 0.5) refunds.push({ mid: mid, amt: r });
    });
  }
  var overall = calcOver(t, ges);
  return { totalSpend: totalSpend, settled: settled, unsettled: totalSpend - settled, days: days, finalCalc: finalCalc, ft: ft, refunds: refunds, overall: overall };
}
function tfRow(t, units, f, key, showBank){
  var done = !!t.tfDone[key];
  var toU = units[f.to], fromU = units[f.from];
  var fromB = fromU.solo ? bdg(fromU.solo, 18) + ' ' : '';
  var toB = toU.solo ? bdg(toU.solo, 18) + ' ' : '';
  return '<div class="tf' + (done ? ' done' : '') + '"><input type="checkbox" data-tfk="' + key + '"' + (done ? ' checked' : '') + '>' +
    '<div style="flex:1"><div class="who">' + fromB + esc(fromU.name) + ' → ' + toB + esc(toU.name) + '</div>' +
    (showBank ? (toU.bank ? '<div class="bank">收款：' + esc(toU.bank) + ' <button class="btn sub mini" data-cpb="' + esc(toU.bank) + '|' + esc(toU.name) + '" style="padding:2px 8px;font-size:12px">複製帳號</button></div>'
                          : '<div class="bank">（' + esc(toU.name) + ' 尚未登記帳戶）</div>') : '') +
    '</div><div class="amt">' + money(t.home, f.amt) + '</div></div>';
}

function settleText(t, M){
  var L = [];
  L.push('【' + t.name + '】結算 ' + todayISO());
  L.push('總支出 ' + t.home + ' ' + fmt(M.totalSpend) + '｜已結清 ' + fmt(M.settled) + '｜未結清 ' + fmt(M.unsettled));
  M.days.forEach(function(dy){
    L.push('────────');
    L.push(dy.date + (dy.done ? ' ✅已結清' : ' ⏳未結清') + '（' + t.home + ' ' + fmt(dy.total) + '）');
    dy.calc.transfers.forEach(function(f, i){
      var toU = dy.calc.units[f.to];
      var done = t.tfDone[dy.keys[i]] ? ' ✅' : '';
      L.push('　' + dy.calc.units[f.from].name + ' → ' + toU.name + ' ' + fmt(f.amt) + (toU.bank ? '（' + toU.bank + '）' : '') + done);
    });
    if(!dy.calc.transfers.length) L.push('　無須轉帳');
  });
  if(M.unsettled > 0.5 && M.finalCalc.transfers.length){
    L.push('────────');
    L.push('未結清合併總結算：');
    M.finalCalc.transfers.forEach(function(f){
      var toU = M.finalCalc.units[f.to];
      L.push('　' + M.finalCalc.units[f.from].name + ' → ' + toU.name + ' ' + fmt(f.amt) + (toU.bank ? '（' + toU.bank + '）' : ''));
    });
  }
  if(M.ft.fin > 0){
    L.push('🏦基金：入 ' + fmt(M.ft.fin) + '｜支 ' + fmt(M.ft.fout) + '｜餘 ' + fmt(M.ft.bal));
    M.refunds.forEach(function(f){ L.push('　退 ' + mname(f.mid) + ' ' + fmt(f.amt) + (t.tfDone['F>' + f.mid] ? ' ✅' : '')); });
  }
  return L.join('\n');
}
function reportText(t, M){
  var es = t.expenses.filter(function(e){ return !e._del; });
  var minD = null, maxD = null, byCat = {}, cash = 0, card = 0, fund = 0, top = null;
  es.forEach(function(e){
    var h = homeAmt(e);
    if(!minD || e.date < minD) minD = e.date;
    if(!maxD || e.date > maxD) maxD = e.date;
    byCat[e.cat] = (byCat[e.cat] || 0) + h;
    if(e.payer === FUND) fund += h; else if(e.card) card += h; else cash += h;
    if(!top || h > top.h) top = { h: h, desc: e.desc, date: e.date };
  });
  var d1 = t.startDate || minD, d2 = t.endDate || maxD;
  var days = (d1 && d2) ? Math.floor((new Date(d2+'T00:00:00') - new Date(d1+'T00:00:00'))/86400000) + 1 : 0;
  var sw = 0;
  t.members.forEach(function(m){
    if((M.overall.share[m.id] || 0) > 0.5 || (M.overall.paid[m.id] || 0) > 0.5) sw += weightOf(t, m.id);
  });
  var L = [];
  L.push('🧳【' + t.name + '】旅程總結');
  if(d1) L.push('📅 ' + d1 + ' ~ ' + d2 + '（' + days + ' 天）· ' + t.members.length + ' 人');
  L.push('💰 團體總支出 ' + t.home + ' ' + fmt(M.totalSpend));
  if(days > 0) L.push('📆 每日平均 ' + t.home + ' ' + fmt(M.totalSpend / days));
  if(sw > 0) L.push('👤 人均（按實際分攤人頭）' + t.home + ' ' + fmt(M.totalSpend / sw));
  if(top) L.push('🏆 最貴一筆：' + top.desc + ' ' + t.home + ' ' + fmt(top.h) + '（' + top.date + '）');
  var cats = Object.keys(byCat).sort(function(a,b){ return byCat[b] - byCat[a]; }).slice(0,3);
  if(cats.length){
    L.push('📊 花最多：' + cats.map(function(c){
      var ci = catInfo(c);
      return ci[1] + ci[2] + ' ' + (M.totalSpend > 0 ? Math.round(byCat[c] / M.totalSpend * 100) : 0) + '%';
    }).join('｜'));
  }
  L.push('💳 刷卡 ' + fmt(card) + '｜💵 現金 ' + fmt(cash) + (M.ft.fin > 0 ? '｜🏦 基金支付 ' + fmt(fund) : ''));
  if(M.ft.fin > 0) L.push('🏦 基金：入 ' + fmt(M.ft.fin) + '｜支 ' + fmt(M.ft.fout) + '｜餘 ' + fmt(M.ft.bal));
  return L.join('\n');
}

var CAT_COLORS = { food:'#D85A30', trans:'#378ADD', stay:'#7F77DD', shop:'#D4537E', tix:'#BA7517', daily:'#0891B2', misc:'#888780' };
function renderStats(){
  var t = trip();
  var box = document.getElementById('statsBox');
  if(!t){ box.innerHTML = '<div class="empty">還沒有旅程</div>'; return; }
  var es = t.expenses.filter(function(e){ return !e._del; }).concat(privList().filter(function(e){ return !e._del; }));
  if(!es.length){ box.innerHTML = '<div class="empty">還沒有帳可以統計</div>'; return; }
  var total = 0, byCat = {}, byDay = {}, byDayCat = {}, byPayer = {}, cash = 0, card = 0, fund = 0;
  es.forEach(function(e){
    var h = homeAmt(e);
    total += h;
    byCat[e.cat] = (byCat[e.cat] || 0) + h;
    byDay[e.date] = (byDay[e.date] || 0) + h;
    if(!byDayCat[e.date]) byDayCat[e.date] = {};
    byDayCat[e.date][e.cat] = (byDayCat[e.date][e.cat] || 0) + h;
    if(!e.priv) byPayer[e.payer] = (byPayer[e.payer] || 0) + h;
    if(e.payer === FUND) fund += h; else if(e.card) card += h; else cash += h;
  });
  var html = '<div class="card"><div class="lbl" style="font-weight:600;color:var(--tx)">錢花去哪（含私人）</div>';
  var cats = Object.keys(byCat).sort(function(a,b){ return byCat[b] - byCat[a]; });
  var maxC = byCat[cats[0]] || 1;
  cats.forEach(function(c){
    var ci = catInfo(c);
    var pct = total > 0 ? Math.round(byCat[c] / total * 100) : 0;
    html += '<div class="srow"><span class="sl">' + ci[1] + ' ' + ci[2] + '</span>' +
      '<div class="hbar"><div style="width:' + Math.max(3, Math.round(byCat[c] / maxC * 100)) + '%;background:' + (CAT_COLORS[c] || '#888780') + '"></div></div>' +
      '<span class="sv">' + fmt(byCat[c]) + '｜' + pct + '%</span></div>';
  });
  html += '</div>';
  html += '<div class="card"><div class="lbl" style="font-weight:600;color:var(--tx)">付款方式</div>' +
    '<div class="sumrow"><span>💵 現金</span><b>' + t.home + ' ' + fmt(cash) + '</b></div>' +
    '<div class="sumrow"><span>💳 信用卡（含手續費）</span><b>' + t.home + ' ' + fmt(card) + '</b></div>' +
    (fund > 0 ? '<div class="sumrow"><span>🏦 共同基金</span><b>' + t.home + ' ' + fmt(fund) + '</b></div>' : '') +
    '<div class="hint" style="margin-top:4px">回國對信用卡帳單用刷卡合計核對。</div></div>';
  var days = Object.keys(byDay).sort();
  if(days.length >= 1){
    var cv = S.chartView || 'bar';
    var show = days.slice(-14);
    var maxD = 1; show.forEach(function(d){ if(byDay[d] > maxD) maxD = byDay[d]; });
    html += '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center">' +
      '<span class="lbl" style="margin:0;font-weight:600;color:var(--tx)">每日支出</span>' +
      '<span class="cseg" id="cvSeg">' +
      [['bar','📊'],['stack','🧱'],['donut','🍩'],['heat','🗓️']].map(function(v){ return '<span data-cv="' + v[0] + '"' + (cv === v[0] ? ' class="on"' : '') + '>' + v[1] + '</span>'; }).join('') +
      '</span></div>';
    if(cv === 'bar'){
      html += '<div class="cols">';
      show.forEach(function(d){
        var h = Math.max(2, Math.round(byDay[d] / maxD * 100));
        html += '<div class="col" data-day="' + d + '"><div class="cbar" style="height:' + h + '%"></div><div class="clab">' + Number(d.slice(8,10)) + '</div></div>';
      });
      html += '</div><div class="hint" style="margin-top:4px;display:flex;justify-content:space-between"><span>👆 點柱子看金額</span><span>最高 ' + t.home + ' ' + fmt(maxD) + '</span></div>';
    } else if(cv === 'stack'){
      html += '<div class="cols">';
      show.forEach(function(d){
        var segs = '';
        CATS.forEach(function(c){
          var v = (byDayCat[d] && byDayCat[d][c[0]]) || 0;
          if(v <= 0) return;
          segs = '<div style="height:' + Math.max(1, Math.round(v / maxD * 100)) + '%;background:' + (CAT_COLORS[c[0]] || '#888') + '"></div>' + segs;
        });
        html += '<div class="col" data-day="' + d + '" style="justify-content:flex-end">' + segs + '<div class="clab">' + Number(d.slice(8,10)) + '</div></div>';
      });
      html += '</div><div class="hint" style="margin-top:6px;text-align:center">' +
        CATS.filter(function(c){ return byCat[c[0]] > 0; }).map(function(c){ return '<span style="color:' + CAT_COLORS[c[0]] + '">■</span>' + c[2]; }).join('　') + '</div>';
    } else if(cv === 'donut'){
      var stops = [], acc2 = 0;
      var dcats = Object.keys(byCat).sort(function(a,b){ return byCat[b] - byCat[a]; });
      dcats.forEach(function(c){
        var p = total > 0 ? byCat[c] / total * 100 : 0;
        stops.push((CAT_COLORS[c] || '#888') + ' ' + acc2.toFixed(2) + '% ' + (acc2 + p).toFixed(2) + '%');
        acc2 += p;
      });
      html += '<div class="donutw"><div class="donut" style="background:conic-gradient(' + stops.join(',') + ')">' +
        '<div class="dc"><span style="font-size:10px;color:var(--tx3)">總支出</span><span style="font-size:15px;font-weight:700">' + fmt(total) + '</span><span style="font-size:9px;color:var(--tx3)">' + t.home + '</span></div></div>' +
        '<div style="flex:1;font-size:12px">' +
        dcats.map(function(c){
          var ci = catInfo(c);
          return '<div style="display:flex;justify-content:space-between;padding:2px 0"><span><span style="color:' + (CAT_COLORS[c] || '#888') + '">■</span> ' + ci[1] + ci[2] + '</span><span style="color:var(--tx2)">' + fmt(byCat[c]) + '｜' + (total > 0 ? Math.round(byCat[c] / total * 100) : 0) + '%</span></div>';
        }).join('') + '</div></div>';
    } else if(cv === 'heat'){
      var hshow = days.slice(-35);
      var first = hshow[0];
      var lead = new Date(first + 'T00:00:00').getDay();
      var maxH = 1; hshow.forEach(function(d){ if(byDay[d] > maxH) maxH = byDay[d]; });
      var dmap = {}; hshow.forEach(function(d){ dmap[d] = true; });
      html += '<div class="heatg">' + WD.map(function(w){ return '<div class="hl">' + w + '</div>'; }).join('');

      var cur2 = new Date(first + 'T00:00:00');

      while(cur2 <= last){
        var iso = cur2.getFullYear() + '-' + String(cur2.getMonth()+1).padStart(2,'0') + '-' + String(cur2.getDate()).padStart(2,'0');
        var v2 = byDay[iso] || 0;
        var ratio = v2 / maxH;
        var bgc = v2 > 0 ? 'rgba(15,118,110,' + (0.15 + 0.85 * ratio).toFixed(2) + ')' : 'var(--ro)';
        var txc = ratio > 0.4 ? '#fff' : 'var(--tx2)';

    }
    html += '</div>';
  }
  var payers = Object.keys(byPayer).sort(function(a,b){ return byPayer[b] - byPayer[a]; });
  if(payers.length){
    var maxP = byPayer[payers[0]] || 1;

  box.innerHTML = html;
  box.querySelectorAll('[data-cv]').forEach(function(el){
    el.onclick = function(){ S.chartView = el.dataset.cv; saveLocal(); renderStats(); };
  });
  box.querySelectorAll('[data-day]').forEach(function(el){

    };
  });

function recalcRates(t, es){
  var todo = [], seen = {};
  es.forEach(function(e){
    if(e.cur === t.home){ e.rate = 1; e._mt = Date.now(); return; }
    var key = e.cur + '_' + t.home + '_' + e.date;
    if(!S.rateCache[key] && !seen[key]){ seen[key] = true; todo.push({ cur: e.cur, date: e.date, key: key }); }
  });
  var fail = 0, done = 0;
  function applyAll(){
    var miss = 0;
    es.forEach(function(e){
      if(e.cur === t.home) return;
      var r = S.rateCache[e.cur + '_' + t.home + '_' + e.date];
      if(r){ e.rate = r; e._mt = Date.now(); } else miss++;
    });
    saveLocal(); save();
    toast('已重算匯率' + (miss ? '；' + miss + ' 筆抓不到，保留原值請手動改' : ' ✔'));
  }
  if(!todo.length){ applyAll(); return; }
  toast('重算中，抓取 ' + todo.length + ' 組匯率…');
  var idx = 0;
  function next(){
    if(idx >= todo.length){ applyAll(); return; }
    var it = todo[idx++];
    fetchRateFor(it.cur, t.home, it.date, function(r){ S.rateCache[it.key] = r; done++; next(); }, function(){ fail++; next(); });
  }
  next();
}
function csvExport(t){
  var rows = [['日期','項目','類別','消費幣別','消費金額','匯率','信用卡','手續費%','主幣','主幣金額','付款人','分攤','被請客','私人']];
  var es = t.expenses.filter(function(e){ return !e._del; }).concat(privList().filter(function(e){ return !e._del; }));
  es.sort(function(a,b){ return a.date < b.date ? -1 : 1; });
  es.forEach(function(e){
    rows.push([e.date, e.desc, catInfo(e.cat)[2], e.cur, e.amt, e.rate, e.card ? 'Y' : '', e.card ? e.feePct : '',
      t.home, Math.round(homeAmt(e)*100)/100, mname(e.payer),
      (e.split||[]).map(mname).join('、'),
      (e.treat||[]).map(function(id){ return mname(id) + (e.treatBy && e.treatBy[id] ? '(由' + mname(e.treatBy[id]) + '請)' : ''); }).join('、'),
      e.priv ? 'Y' : '']);
  });
  var csv = '﻿' + rows.map(function(r){ return r.map(function(c){ return '"' + String(c == null ? '' : c).replace(/"/g,'""') + '"'; }).join(','); }).join('\r\n');
  dl(safeName(t.name) + '_帳目_' + todayISO() + '.csv', csv, 'text/csv;charset=utf-8');
  toast('已匯出 CSV');
}
function importBackup(file){
  var rd = new FileReader();
  rd.onload = function(){
    try{
      var d = JSON.parse(rd.result);
      if(!d || d.app !== 'tsplit' || !d.trip || !d.trip.code){ toast('不是有效的備份檔'); return; }
      var warn = '還原「' + d.trip.name + '」？會覆蓋本機同代碼的旅程資料';
      if(window._cloud && window._cloud.ready) warn += '\n\n⚠️ 雲端同步啟用中：還原後本機資料會直接覆蓋雲端，旅伴較新的變更可能被蓋掉！';
      if(!confirm(warn)) return;
      S.trips[d.trip.code] = d.trip;
      S.privExp[d.trip.code] = d.priv || [];
      if(d.me) S.me[d.trip.code] = d.me;
      S.cur = d.trip.code; F = null; editId = null;
      saveLocal();
      if(window._cloud && window._cloud.ready){ window._cloud.save(d.trip.code, d.trip); }
      startListen(); renderAll(); toast('已還原「' + d.trip.name + '」');
    }catch(e){ toast('備份檔讀取失敗'); }
  };
  rd.readAsText(file);
}
function genCode(){
  var A = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789', s = '';
  for(var i=0;i<6;i++) s += A.charAt(Math.floor(Math.random() * A.length));
  return s;
}
function createTrip(){
  var name = document.getElementById('newTripName').value.trim() || '未命名旅程';
  var code = genCode();
  while(S.trips[code]) code = genCode();
  S.trips[code] = { code: code, name: name, home: 'TWD', feePct: 1.5, members: [], expenses: [], templates: [], budget: { total:0, daily:0 }, fund: [], families: [], tfDone: {}, startDate: '', endDate: '', domestic: false, fundKeeper: '', archived: false, metaMt: Date.now(), createdAt: Date.now() };
  S.cur = code; F = null; editId = null; _convCur = null;
  startListen(); save();
  toast('已建立「' + name + '」，先去新增成員');
}
function joinTrip(){
  var code = document.getElementById('joinCode').value.trim().toUpperCase();
  if(!code){ toast('請輸入代碼'); return; }
  if(S.trips[code]){ S.cur = code; startListen(); save(); toast('已切換到 ' + S.trips[code].name); return; }
  if(!(window._cloud && window._cloud.ready)){ toast('要先啟用雲端同步才能用代碼加入'); return; }
  toast('查詢中…');
  window._cloud.load(code).then(function(d){
    if(!d){ toast('找不到這個代碼'); return; }
    S.trips[code] = d; S.cur = code; F = null; editId = null; _convCur = null;
    startListen(); saveLocal(); renderAll();
    toast('已加入「' + d.name + '」');
  }).catch(function(){ toast('查詢失敗，請稍後再試'); });
}

/* ───── 雲端 ───── */
function startListen(){
  var t = trip();
  if(t && window._cloud && window._cloud.ready) window._cloud.listen(t.code, applyRemote);
}
function applyRemote(code, remote){
  if(!remote) return;
  var local = S.trips[code];
  if(!local){ S.trips[code] = remote; }
  else {
    if((remote.metaMt || 0) > (local.metaMt || 0)){
      local.name = remote.name; local.home = remote.home; local.feePct = remote.feePct;
      local.members = remote.members || []; local.metaMt = remote.metaMt;
      local.templates = remote.templates || []; local.budget = remote.budget || { total:0, daily:0 };
      local.fund = remote.fund || []; local.families = remote.families || []; local.tfDone = remote.tfDone || {};
      local.startDate = remote.startDate || ''; local.endDate = remote.endDate || '';
      local.domestic = !!remote.domestic; local.fundKeeper = remote.fundKeeper || ''; local.archived = !!remote.archived;
    }
    var map = {};
    (local.expenses || []).forEach(function(e){ map[e.id] = e; });
    (remote.expenses || []).forEach(function(re){
      var le = map[re.id];
      if(!le || (re._mt || 0) > (le._mt || 0)) map[re.id] = re;
    });
    local.expenses = Object.keys(map).map(function(k){ return map[k]; });
  }
  saveLocal(); renderAll();
}
window.addEventListener('cloud-ready', function(){
  renderSync(); startListen();
  var t = trip(); if(t) pushCloud();
});

<script type="module">
try{
  if(window.FIREBASE_CONFIG){
    const appM = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
    const authM = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js');
    const fsM = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');
    const app = appM.initializeApp(window.FIREBASE_CONFIG);
    const auth = authM.getAuth(app);
    await authM.signInAnonymously(auth);
    const db = fsM.getFirestore(app);
    const _subs = {};
    window._cloud = {
      ready: true,
      save: function(code, data){
        return fsM.setDoc(fsM.doc(db, 'trips', code), { d: JSON.stringify(data), _ts: Date.now() })
          .catch(function(e){ console.error('[cloud] save fail', e); });
      },
      load: async function(code){
        const s = await fsM.getDoc(fsM.doc(db, 'trips', code));
        return s.exists() ? JSON.parse(s.data().d) : null;
      },
      listen: function(code, cb){
        if(_subs[code]) return;
        _subs[code] = fsM.onSnapshot(fsM.doc(db, 'trips', code), function(s){
          if(s.metadata.hasPendingWrites) return;
          if(s.exists()){
            try{ cb(code, JSON.parse(s.data().d)); }catch(e){ console.error('[cloud] parse fail', e); }
          }
        }, function(e){ console.error('[cloud] listen fail', e); });
      }
    };
    window.dispatchEvent(new Event('cloud-ready'));
    console.log('[cloud] ready');
  } else {
    window._cloud = { ready: false };
    console.log('[cloud] 未設定 FIREBASE_CONFIG，本機模式');
  }
}catch(e){
  console.error('[cloud] init fail', e);
  window._cloud = { ready: false };
}
</script>
</body>
</html>
